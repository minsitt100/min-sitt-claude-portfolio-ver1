  <style>
    .resume-page {
      padding-top: 120px;
      padding-bottom: 80px;
      min-height: 100vh;
    }
    .resume-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 16px;
      flex-wrap: wrap;
    }
    .resume-header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      margin: 0;
    }
    .resume-actions {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }
    .resume-actions a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--r-full);
      font-size: 0.8125rem;
      font-weight: 500;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .resume-actions a:hover { opacity: 0.75; }
    .resume-btn-download {
      background: var(--accent);
      color: #fff;
    }
    .resume-btn-newtab {
      background: var(--surface-2, rgba(255,255,255,0.07));
      color: var(--text-primary);
      border: 1px solid var(--border, rgba(255,255,255,0.1));
    }
    .resume-embed-wrapper {
      width: 100%;
      border-radius: var(--r-lg);
      overflow: hidden;
      box-shadow: var(--shadow-xl);
      background: #1a1a1a;
    }
    .resume-embed-wrapper iframe {
      display: block;
      width: 100%;
      height: 85vh;
      border: none;
    }
    .resume-placeholder {
      width: 100%;
      height: 85vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: rgba(255,255,255,0.35);
      font-size: 0.875rem;
    }
    .resume-placeholder svg {
      opacity: 0.25;
    }
  </style>
</head>

            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

              <polyline points="14 2 14 8 20 8"/>

            <span>Your browser doesn't support embedded PDFs.</span>
            <a href="assets/MinSittThuAungResume.pdf" download class="resume-btn-download" style="margin-top:8px">Download Resume</a>
          </div>
        </iframe>
